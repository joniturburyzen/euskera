<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Euskera Ikaslea</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#2E7D32">
    <link rel="apple-touch-icon" href="./icon.png">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* CSS estándar (Sin @apply) */
        body { margin: 0; background-color: #f8fafc; font-family: sans-serif; }
        .screen { display: none; min-height: 100vh; width: 100%; flex-direction: column; }
        .screen.active { display: flex !important; }
        .character-float { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>

    <section id="scr-splash" class="screen active flex flex-col items-center justify-between p-10 text-center">
        <div class="flex-grow flex items-center justify-center">
            <img src="./personaje-standby.png" class="w-auto h-auto max-h-[45vh] object-contain character-float" alt="Aitona">
        </div>
        <div class="w-full max-w-xs mx-auto mb-10">
            <h1 class="text-4xl font-extrabold mb-8 text-slate-800">Euskera <span class="text-green-600">Ikaslea</span></h1>
            <button onclick="showScreen('scr-modules')" 
                class="w-full bg-green-600 text-white font-bold py-5 rounded-2xl shadow-lg active:translate-y-1 transition-all uppercase">
                HASI IKASTEN
            </button>
        </div>
    </section>

    <section id="scr-modules" class="screen p-6 bg-slate-50">
        <button onclick="showScreen('scr-splash')" class="text-slate-400 text-2xl font-bold self-start p-2">← Atzera</button>
        <h2 class="text-3xl font-black my-8 text-slate-800 text-center">Aukeratu</h2>
        
        <div class="grid gap-4 w-full max-w-sm mx-auto">
            <div onclick="startQuiz()" class="bg-white p-6 rounded-3xl shadow-sm border-2 border-slate-100 flex items-center cursor-pointer active:scale-95 transition-all">
                <span class="text-4xl mr-4">📝</span>
                <div class="text-left">
                    <h3 class="font-bold text-lg text-slate-800">Autoebaluazioa</h3>
                    <p class="text-slate-500 text-sm">Pon a prueba tu euskera</p>
                </div>
            </div>
            <div onclick="showScreen('scr-dictionary')" class="bg-white p-6 rounded-3xl shadow-sm border-2 border-slate-100 flex items-center cursor-pointer active:scale-95 transition-all">
                <span class="text-4xl mr-4">👴</span>
                <div class="text-left">
                    <h3 class="font-bold text-lg text-slate-800">Aitona Mentor</h3>
                    <p class="text-slate-500 text-sm">Pregúntale lo que quieras</p>
                </div>
            </div>
        </div>
    </section>

    <section id="scr-quiz" class="screen p-6 bg-white">
        <div class="flex justify-between items-center mb-6">
            <button onclick="showScreen('scr-modules')" class="text-slate-400 text-3xl font-bold">✕</button>
            <span id="quiz-progress" class="font-bold text-green-600">1/2</span>
        </div>
        <div class="text-center mb-6 h-48 flex items-center justify-center">
            <img id="quiz-character" src="./personaje-standby.png" class="h-full w-auto object-contain character-float">
        </div>
        <div class="text-center px-4">
            <h2 id="quiz-question" class="text-2xl font-black text-slate-800 mb-8">...</h2>
            <div id="quiz-options" class="w-full"></div>
        </div>
    </section>

    <section id="scr-dictionary" class="screen p-6 bg-slate-50">
        <button onclick="showScreen('scr-modules')" class="text-slate-400 text-3xl font-bold self-start">←</button>
        <div class="bg-white rounded-3xl p-6 shadow-xl my-6 text-center">
            <img src="./personaje-mini.png" class="h-32 mx-auto mb-4 character-float">
            <input id="mentor-query" type="text" placeholder="Escribe algo..." 
                class="w-full p-4 rounded-xl border-2 border-slate-200 mb-4 outline-none focus:border-green-500 text-lg">
            <button onclick="askMentor()" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg">PREGUNTAR</button>
        </div>
        <div id="mentor-resp-container" class="hidden bg-green-50 p-6 rounded-3xl border-2 border-green-100">
            <p id="mentor-resp" class="text-slate-800 font-medium"></p>
        </div>
    </section>

    <script>
        // 1. NAVEGACIÓN (SIMPLE Y ROBUSTA)
        function showScreen(id) {
            const screens = document.querySelectorAll('.screen');
            screens.forEach(s => s.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) target.classList.add('active');
            window.scrollTo(0, 0);
        }

        // 2. LÓGICA DEL QUIZ (CON IMÁGENES)
        const quizData = [
            { q: "¿Cómo se dice 'Hola'?", opt: ["Agur", "Kaixo", "Bai"], correct: 1 },
            { q: "¿Qué es 'Etxea'?", opt: ["Coche", "Perro", "Casa"], correct: 2 }
        ];
        let currentIdx = 0;

        function startQuiz() {
            currentIdx = 0;
            showScreen('scr-quiz');
            loadQuestion();
        }

        function loadQuestion() {
            const char = document.getElementById('quiz-character');
            char.src = "./personaje-standby.png";
            const data = quizData[currentIdx];
            document.getElementById('quiz-question').innerText = data.q;
            document.getElementById('quiz-progress').innerText = `${currentIdx + 1}/${quizData.length}`;
            const container = document.getElementById('quiz-options');
            container.innerHTML = '';
            data.opt.forEach((o, i) => {
                const b = document.createElement('button');
                b.className = "w-full p-4 mb-3 text-center rounded-2xl border-2 border-slate-200 bg-white font-bold text-slate-700 active:bg-slate-100 transition-all";
                b.innerText = o;
                b.onclick = () => check(i);
                container.appendChild(b);
            });
        }

        function check(i) {
            const char = document.getElementById('quiz-character');
            if(i === quizData[currentIdx].correct) {
                char.src = "./personaje-acierto.png";
            } else {
                char.src = "./personaje-fallo.png";
            }
            setTimeout(() => {
                currentIdx++;
                if(currentIdx < quizData.length) loadQuestion();
                else { alert("¡Terminado!"); showScreen('scr-modules'); }
            }, 1500);
        }

        // 3. DICCIONARIO
        async function askMentor() {
            const q = document.getElementById('mentor-query').value.trim();
            if(!q) return;
            const resp = document.getElementById('mentor-resp');
            document.getElementById('mentor-resp-container').classList.remove('hidden');
            resp.innerText = "Pentsatzen...";
            try {
                const res = await fetch('https://empty-silence-364e.joniturbu.workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: q })
                });
                const data = await res.json();
                resp.innerText = data.texto || "Barkatu, ez dut ulertu.";
            } catch(e) { resp.innerText = "Error de conexión."; }
        }
    </script>
</body>
</html>
