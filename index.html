<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Euskera Ikaslea</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2E7D32">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        body { font-family: 'Nunito', sans-serif; background-color: #f8fafc; }
        
        .screen { display: none; min-height: 100vh; width: 100%; flex-direction: column; }
        .screen.active { display: flex !important; }

        .btn-green {
            @apply bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-6 rounded-2xl 
            shadow-[0_4px_0_rgb(21,128,61)] active:shadow-none active:translate-y-1 transition-all;
        }

        /* Animación de flotación del Aitona */
        .character-float { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <section id="scr-splash" class="screen active p-8 text-center justify-between">
        <div class="flex-grow flex items-center justify-center">
            <img src="personaje-standby.png" class="w-auto h-auto max-h-[50vh] object-contain character-float" alt="Mentor">
        </div>
        <div class="w-full max-w-xs mx-auto mb-10">
            <h1 class="text-4xl font-black mb-6 text-slate-800 tracking-tight">Euskera <span class="text-green-600">Ikaslea</span></h1>
            <button onclick="showScreen('scr-modules')" class="btn-green w-full uppercase animate__animated animate__pulse animate__infinite">HASI IKASTEN</button>
        </div>
    </section>

    <section id="scr-modules" class="screen p-6">
        <div class="flex items-center mb-8">
            <button onclick="showScreen('scr-splash')" class="text-slate-400 text-2xl">←</button>
            <h2 class="text-2xl font-black ml-4 text-slate-800">Módulos</h2>
        </div>
        <div class="grid gap-4">
            <div onclick="showScreen('scr-dictionary')" class="bg-white p-6 rounded-3xl shadow-sm border-2 border-slate-100 flex items-center cursor-pointer">
                <div class="text-4xl mr-4">👴</div>
                <div>
                    <h3 class="font-bold text-lg">Diccionario Aitona</h3>
                    <p class="text-slate-500 text-sm">Pregúntale lo que quieras al mentor</p>
                </div>
            </div>
            </div>
    </section>

    <section id="scr-dictionary" class="screen p-6 bg-slate-50">
        <div class="flex items-center mb-6">
            <button onclick="showScreen('scr-modules')" class="text-slate-400 text-2xl">←</button>
            <h2 class="text-2xl font-black ml-4 text-slate-800">Diccionario</h2>
        </div>
        
        <div class="bg-white rounded-3xl p-6 shadow-xl mb-6">
            <div class="flex justify-center mb-4">
                <img src="personaje-mini.png" class="h-32 w-auto character-float" alt="Aitona">
            </div>
            <p class="text-center text-slate-600 italic mb-4">"¡Aupa ahí! ¿Qué palabra te tiene mosqueado?"</p>
            <input id="mentor-query" type="text" placeholder="Escribe en castellano..." 
                class="w-full p-4 rounded-xl border-2 border-slate-100 focus:border-green-500 outline-none transition-all mb-4">
            <button onclick="askMentor()" class="btn-green w-full">PREGUNTAR</button>
        </div>

        <div id="mentor-resp-container" class="hidden animate__animated animate__fadeInUp">
            <div class="bg-green-50 border-2 border-green-100 p-6 rounded-3xl relative">
                <div id="mentor-loading" class="flex justify-center py-4">
                    <div class="animate-bounce text-2xl">⏳</div>
                </div>
                <p id="mentor-resp" class="text-slate-800 font-medium leading-relaxed"></p>
            </div>
        </div>
    </section>

    <script>
        // --- NAVEGACIÓN ---
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(screenId);
            if(target) target.classList.add('active');
            window.scrollTo(0, 0);
        }

        // --- LÓGICA DICCIONARIO AITONA ---
        async function askMentor() {
            const query = document.getElementById('mentor-query').value.trim();
            if(!query) return;

            const loading = document.getElementById('mentor-loading');
            const resp = document.getElementById('mentor-resp');
            const container = document.getElementById('mentor-resp-container');

            container.classList.remove('hidden');
            loading.classList.remove('hidden');
            resp.classList.add('hidden');

            try {
                // LLAMADA A TU WORKER
                const response = await fetch('https://empty-silence-364e.joniturbu.workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                });

                const data = await response.json();
                
                loading.classList.add('hidden');
                resp.innerText = data.texto || "Barkatu, ezin izan dut erantzun.";
                resp.classList.remove('hidden');
            } catch(e) {
                loading.classList.add('hidden');
                resp.innerText = "¡Aibalaosti! Ha habido un error de conexión.";
                resp.classList.remove('hidden');
            }
        }

        // Inicializar Supabase aquí si lo usas para el Quiz
    </script>
</body>
</html>
