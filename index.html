<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euskera Ikaslea</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --green: #2E7D32; --red: #C62828; }
        body { font-family: sans-serif; background: #fdfdfd; overflow-x: hidden; }
        .screen { display: none; min-height: 100vh; flex-direction: column; }
        .screen.active { display: flex; }
        .btn-green { background: var(--green); color: white; border-radius: 1.2rem; font-weight: bold; }
        .character-float { animation: floating 3s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body>
    <section id="scr-splash" class="screen active items-center justify-center p-8">
        <img src="assets/personaje-standby.jpg" class="w-72 h-72 character-float mb-10">
        <button onclick="showScreen('scr-modules')" class="btn-green w-full max-w-xs py-5 text-xl shadow-lg">HASI IKASTEN</button>
    </section>

    <section id="scr-modules" class="screen p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-black">Moduluak</h1>
            <img src="assets/personaje-mini.png" onclick="openMentor()" class="w-12 h-12 rounded-full border-2 border-green-600 cursor-pointer">
        </div>
        <div id="module-list" class="grid gap-4"></div>
    </section>

    <section id="scr-quiz" class="screen bg-white">
        <div class="p-6 flex-grow flex flex-col">
            <div id="q-card" class="bg-gray-50 p-8 rounded-3xl border-2 border-gray-100 mb-6 text-center text-xl font-bold"></div>
            <div id="options" class="grid gap-3"></div>
        </div>
        <div id="feedback" class="fixed inset-0 bg-white/95 hidden flex-col items-center justify-center p-10 z-50 animate__animated animate__fadeIn">
            <img id="fb-img" src="" class="w-64 h-64 mb-6">
            <h2 id="fb-title" class="text-3xl font-black mb-10"></h2>
            <button onclick="nextQuestion()" class="btn-green w-full max-w-xs py-4">JARRAITU</button>
        </div>
    </section>

    <div id="mentor-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-6 z-50">
        <div class="bg-white w-full rounded-3xl p-6 shadow-2xl">
            <h3 class="text-xl font-bold mb-4">Itzuli Mentorea</h3>
            <input type="text" id="mentor-query" class="w-full bg-gray-100 p-3 rounded-xl mb-4 outline-none border-2 focus:border-green-600" placeholder="Zer itzuli nahi duzu?">
            <button onclick="askMentor()" class="btn-green w-full py-3">GALDETU</button>
            <div id="mentor-resp" class="mt-4 italic text-gray-600 hidden"></div>
            <button onclick="closeMentor()" class="mt-4 text-gray-400 w-full text-center text-sm">Itxi</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN (CAMBIA ESTO)
        const supabase = supabase.createClient('https://ajfifipbzuzyhjsxujvd.supabase.co
', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqZmlmaXBienV6eWhqc3h1anZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyODAyMzIsImV4cCI6MjA4Njg1NjIzMn0.ahwlw5yN-M_8wLu39FXJr7WQeKHIJeWpL4IJdTtShqM
');
        const WORKER_URL = 'https://empty-silence-364e.joniturbu.workers.dev/';

        let currentIdx = 0, currentQs = [];

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'scr-modules') loadModules();
        }

        async function loadModules() {
            const { data } = await supabase.from('modulos').select('*').order('orden');
            document.getElementById('module-list').innerHTML = data.map(m => `
                <div onclick="startQuiz(${m.id})" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 font-bold flex justify-between items-center cursor-pointer">
                    <span>${m.titulo}</span> <span class="text-green-600">→</span>
                </div>
            `).join('');
        }

        async function startQuiz(id) {
            const { data } = await supabase.from('preguntas').select('*').eq('modulo_id', id);
            currentQs = data; currentIdx = 0; showScreen('scr-quiz'); renderQ();
        }

        function renderQ() {
            const q = currentQs[currentIdx];
            document.getElementById('q-card').innerText = q.enunciado;
            document.getElementById('options').innerHTML = q.opciones.map((o, i) => `
                <button onclick="check(${i})" class="bg-white border-2 border-gray-100 p-4 rounded-xl font-semibold hover:border-green-600">${o}</button>
            `).join('');
        }

        function check(idx) {
            const isOk = idx === currentQs[currentIdx].respuesta_correcta;
            const fb = document.getElementById('feedback');
            fb.style.display = 'flex';
            document.getElementById('fb-img').src = isOk ? 'assets/personaje-acierto.jpg' : 'assets/personaje-fallo.jpg';
            document.getElementById('fb-title').innerText = isOk ? 'OSO ONDO!' : 'AI, ENE!';
            document.getElementById('fb-title').style.color = isOk ? 'var(--green)' : 'var(--red)';
        }

        function nextQuestion() {
            document.getElementById('feedback').style.display = 'none';
            currentIdx++;
            if(currentIdx < currentQs.length) renderQ(); else showScreen('scr-modules');
        }

        async function askMentor() {
            const q = document.getElementById('mentor-query').value;
            const resDiv = document.getElementById('mentor-resp');
            resDiv.classList.remove('hidden'); resDiv.innerText = "Pentsatzen... 💭";
            const res = await fetch(WORKER_URL, { method: 'POST', body: JSON.stringify({query: q}) });
            const data = await res.json();
            resDiv.innerText = data.texto;
        }

        function openMentor() { document.getElementById('mentor-modal').style.display = 'flex'; }
        function closeMentor() { document.getElementById('mentor-modal').style.display = 'none'; }
    </script>
</body>
</html>
