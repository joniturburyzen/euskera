<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euskera Ikaslea - Mentor 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --green: #2E7D32; --red: #C62828; }
        body { font-family: 'Segoe UI', sans-serif; background: #fdfdfd; color: #1f2937; }
        .screen { display: none; min-height: 100vh; flex-direction: column; }
        .screen.active { display: flex; }
        .btn-green { background: var(--green); color: white; border-radius: 1.25rem; font-weight: 800; padding: 1.25rem; transition: all 0.2s; box-shadow: 0 10px 15px -3px rgba(46, 125, 50, 0.3); }
        .btn-green:active { transform: scale(0.96); }
        .character-float { animation: floating 3s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .module-card { background: white; border: 1px solid #f1f5f9; border-radius: 1.5rem; transition: all 0.3s; }
        .module-card:hover { border-color: var(--green); transform: translateY(-2px); }
    </style>
</head>
<body>

    <section id="scr-splash" class="screen active items-center justify-center p-8 text-center">
        <img src="personaje-standby.jpg" class="w-72 h-72 character-float mb-10 drop-shadow-2xl rounded-full">
        <h1 class="text-4xl font-black mb-2 text-gray-800 tracking-tight">Euskera Ikaslea</h1>
        <p class="text-gray-500 mb-10 font-medium italic text-lg">Ikasi euskara modu dibertigarrian!</p>
        <button onclick="showScreen('scr-modules')" class="btn-green w-full max-w-xs text-lg uppercase tracking-wider">HASI IKASTEN →</button>
    </section>

    <section id="scr-modules" class="screen p-6 bg-slate-50">
        <header class="flex justify-between items-center mb-10 mt-2">
            <div>
                <h1 class="text-3xl font-black text-gray-900">Moduluak</h1>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Zure aurrerapena</p>
            </div>
            <img src="personaje-mini.png" onclick="openMentor()" class="w-16 h-16 rounded-full border-4 border-white shadow-xl cursor-pointer hover:rotate-6 transition-transform">
        </header>
        <div id="module-list" class="grid gap-4 overflow-y-auto pb-10">
            </div>
    </section>

    <section id="scr-quiz" class="screen bg-white">
        <div class="h-2 bg-slate-100"><div id="progress-bar" class="h-full bg-green-600 transition-all duration-700 w-0"></div></div>
        <div class="p-6 flex-grow flex flex-col items-center max-w-xl mx-auto w-full">
            <div id="q-card" class="w-full bg-slate-50 p-10 rounded-[2.5rem] border-2 border-slate-100 mb-10 mt-6 text-center text-2xl font-bold text-slate-800 shadow-sm animate__animated animate__fadeInDown">
                ...
            </div>
            <div id="options" class="w-full grid gap-4 animate__animated animate__fadeInUp"></div>
        </div>

        <div id="feedback" class="fixed inset-0 bg-white/98 hidden flex-col items-center justify-center p-10 z-50 animate__animated animate__fadeIn">
            <img id="fb-img" src="" class="w-72 h-72 mb-8 drop-shadow-2xl">
            <h2 id="fb-title" class="text-5xl font-black mb-12 italic"></h2>
            <button onclick="nextQuestion()" class="btn-green w-full max-w-xs text-xl">JARRAITU →</button>
        </div>
    </section>

    <div id="mentor-modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center p-6 z-50 backdrop-blur-md">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl animate__animated animate__slideInUp">
            <div class="flex items-center gap-4 mb-6">
                <img src="personaje-mini.png" class="w-12 h-12 rounded-full border-2 border-green-600">
                <h3 class="text-2xl font-bold text-gray-900 text-center w-full">Itzuli Mentorea</h3>
            </div>
            <input type="text" id="mentor-query" class="w-full bg-gray-50 p-5 rounded-2xl mb-4 outline-none border-2 border-gray-100 focus:border-green-600 transition-all text-lg" placeholder="Zer itzuli nahi duzu?">
            <button onclick="askMentor()" class="btn-green w-full py-4 text-lg">GALDETU</button>
            <div id="mentor-resp" class="mt-6 text-gray-700 leading-relaxed italic border-t border-dashed pt-6 hidden animate__animated animate__fadeIn text-center"></div>
            <button onclick="closeMentor()" class="mt-6 text-gray-400 w-full text-center font-bold hover:text-gray-600 uppercase text-xs tracking-widest">ITXI</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN REAL INTEGRADA
        const SUPABASE_URL = 'https://ajfifipbzuzyhjsxujvd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqZmlmaXBienV6eWhqc3h1anZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyODAyMzIsImV4cCI6MjA4Njg1NjIzMn0.ahwlw5yN-M_8wLu39FXJr7WQeKHIJeWpL4IJdTtShqM';
        const WORKER_URL = 'https://empty-silence-364e.joniturbu.workers.dev/'; 

        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentIdx = 0, currentQs = [];

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'scr-modules') loadModules();
        }

        async function loadModules() {
            const { data, error } = await client.from('modulos').select('*').order('orden');
            if (error) return console.error("Error Supabase:", error);
            document.getElementById('module-list').innerHTML = data.map(m => `
                <div onclick="startQuiz(${m.id})" class="module-card p-6 shadow-sm font-bold flex justify-between items-center cursor-pointer group">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-green-50 text-green-700 rounded-full flex items-center justify-center text-sm">${m.orden}</div>
                        <h3 class="text-lg text-slate-800">${m.titulo}</h3>
                    </div>
                    <span class="text-slate-300 group-hover:text-green-600 group-hover:translate-x-1 transition-all">→</span>
                </div>
            `).join('');
        }

        async function startQuiz(id) {
            const { data, error } = await client.from('preguntas').select('*').eq('modulo_id', id);
            if (error) return console.error("Error Preguntas:", error);
            currentQs = data; currentIdx = 0; showScreen('scr-quiz'); renderQ();
        }

        function renderQ() {
            const q = currentQs[currentIdx];
            document.getElementById('q-card').innerText = q.enunciado;
            document.getElementById('progress-bar').style.width = `${(currentIdx / currentQs.length) * 100}%`;
            document.getElementById('options').innerHTML = q.opciones.map((o, i) => `
                <button onclick="check(${i})" class="bg-white border-2 border-slate-100 p-5 rounded-2xl font-bold text-slate-700 hover:border-green-600 hover:bg-green-50 transition-all shadow-sm">${o}</button>
            `).join('');
        }

        function check(idx) {
            const isOk = idx === currentQs[currentIdx].respuesta_correcta;
            const fb = document.getElementById('feedback');
            fb.style.display = 'flex';
            document.getElementById('fb-img').src = isOk ? 'personaje-acierto.jpg' : 'personaje-fallo.jpg';
            document.getElementById('fb-title').innerText = isOk ? 'OSO ONDO!' : 'AI, ENE!';
            document.getElementById('fb-title').style.color = isOk ? 'var(--green)' : 'var(--red)';
        }

        function nextQuestion() {
            document.getElementById('feedback').style.display = 'none';
            currentIdx++;
            if(currentIdx < currentQs.length) renderQ(); else showScreen('scr-modules');
        }

        async function askMentor() {
            const q = document.getElementById('mentor-query').value;
            if(!q) return;
            const resDiv = document.getElementById('mentor-resp');
            resDiv.classList.remove('hidden'); resDiv.innerText = "Pentsatzen ari naiz... 💭";
            try {
                const res = await fetch(WORKER_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({query: q}) 
                });
                const data = await res.json();
                resDiv.innerText = data.texto;
            } catch(e) { resDiv.innerText = "Barkatu, ezin izan dut itzuli momentu honetan."; }
        }

        function openMentor() { document.getElementById('mentor-modal').style.display = 'flex'; }
        function closeMentor() { document.getElementById('mentor-modal').style.display = 'none'; document.getElementById('mentor-resp').classList.add('hidden'); }
    </script>
</body>
</html>
