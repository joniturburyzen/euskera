<!DOCTYPE html>
<html lang="eu">
<head>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2E7D32">
<link rel="apple-touch-icon" href="icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Euskera Ikaslea - Mentor 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --green: #2E7D32; --red: #C62828; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f8fafc; color: #1e293b; overscroll-behavior: none; }
        .screen { display: none; min-height: 100vh; flex-direction: column; }
        .screen.active { display: flex; }
        .btn-green { background: var(--green); color: white; border-radius: 1.5rem; font-weight: 800; padding: 1rem 2rem; font-size: 1.125rem; transition: all 0.2s; box-shadow: 0 4px 6px -1px rgba(46, 125, 50, 0.2), 0 2px 4px -1px rgba(46, 125, 50, 0.1); }
        .btn-green:active { transform: scale(0.97); }
        /* Animación flotante sin marcos (Fallo 1) */
        .character-float { animation: floating-wide 4s ease-in-out infinite; }
        @keyframes floating-wide { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .module-card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: all 0.2s; border: 2px solid transparent; }
        .module-card:active { border-color: var(--green); transform: scale(0.98); }
        /* Sombras para PNG transparentes (Fallo 3 y 4) */
        .floating-img { display: block; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2)); }
    </style>
</head>
<body>

    <section id="scr-splash" class="screen active items-center justify-center p-6 text-center overflow-hidden">
    <div class="flex-grow flex items-center justify-center w-full">
        <img 
            src="personaje-standby.png" 
            class="w-auto h-3/5 max-h-[60vh] character-float floating-img object-contain"
            alt="Mentor Vasco">
    </div>
    <div class="w-full max-w-xs mb-10 z-10">
        <h1 class="text-4xl font-black mb-8 text-slate-800 tracking-tight">Euskera Ikaslea</h1>
        <button onclick="showScreen('scr-modules')" class="btn-green w-full uppercase animate__animated animate__pulse animate__infinite">HASI IKASTEN</button>
    </div>
</section>

    <section id="scr-modules" class="screen p-6 bg-slate-100">
        <header class="flex justify-between items-center mb-8 mt-4 relative z-10">
            <div>
                <h1 class="text-3xl font-black text-slate-900">Moduluak</h1>
                <p class="text-slate-500 text-sm font-bold uppercase tracking-widest">Aukeratu maila bat</p>
            </div>
            <img src="personaje-mini.png" onclick="openMentor()" class="w-20 h-20 floating-img cursor-pointer hover:scale-110 transition-transform">
        </header>
        <div id="module-list" class="grid gap-4 overflow-y-auto pb-20"></div>
    </section>

    <section id="scr-theory" class="screen p-6 bg-white">
        <header class="mb-6">
            <button onclick="showScreen('scr-modules')" class="text-slate-400 font-bold mb-4">← Atzera</button>
            <h1 id="theory-title" class="text-3xl font-black text-slate-900 mb-2"></h1>
            <p id="theory-subtitle" class="text-green-700 font-bold uppercase text-sm"></p>
        </header>
        <div class="flex-grow overflow-y-auto bg-slate-50 p-6 rounded-[2rem] border-2 border-slate-100 shadow-inner">
            <p id="theory-content" class="text-lg text-slate-700 leading-relaxed whitespace-pre-line"></p>
        </div>
        <div class="py-6">
            <button onclick="startQuizFromTheory()" class="btn-green w-full text-xl shadow-xl">HAZ EL TEST →</button>
        </div>
    </section>

    <section id="scr-quiz" class="screen bg-slate-50">
        <div class="fixed top-0 left-0 w-full h-2 bg-slate-200"><div id="progress-bar" class="h-full bg-green-600 transition-all duration-500 w-0"></div></div>
        <div class="p-6 pt-12 flex-grow flex flex-col items-center max-w-xl mx-auto w-full">
            <div class="w-full flex justify-between items-center mb-4 text-slate-400 font-bold text-xs uppercase">
                <span id="q-counter"></span>
                <button onclick="showScreen('scr-modules')">ITXI X</button>
            </div>
            <div id="q-card" class="w-full bg-white p-8 rounded-[2.5rem] shadow-sm mb-8 text-center text-2xl font-bold text-slate-800 animate__animated animate__fadeIn"></div>
            <div id="options" class="w-full grid gap-3 animate__animated animate__fadeInUp"></div>
        </div>

        <div id="feedback" class="fixed inset-0 bg-black/85 hidden flex-col items-center justify-center p-6 z-50 backdrop-blur-sm animate__animated animate__fadeIn">
            <img id="fb-img" src="" class="w-auto h-1/2 max-h-[50vh] mb-6 floating-img animate__animated animate__zoomInDown">
            <h2 id="fb-title" class="text-5xl font-black mb-8 drop-shadow-lg"></h2>
            <button onclick="nextQuestion()" class="btn-green w-full max-w-sm text-xl border-4 border-white/20">JARRAITU →</button>
        </div>
    </section>

    <div id="mentor-modal" class="fixed inset-0 bg-black/60 hidden items-end sm:items-center justify-center z-50 backdrop-blur-sm animate__animated animate__fadeIn">
        <div class="bg-white w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 shadow-2xl animate__animated animate__slideInUp relative">
            <div class="flex items-center gap-4 mb-6">
                <img src="personaje-mini.png" class="w-16 h-16 floating-img">
                <div>
                    <h3 class="text-2xl font-black text-slate-900">Itzuli Mentorea</h3>
                    <p class="text-slate-500 text-sm">Aitona de Bilbao</p>
                </div>
            </div>
            <div class="flex gap-2 mb-4">
                <input type="text" id="mentor-query" class="flex-grow bg-slate-100 p-4 rounded-2xl outline-none border-2 border-transparent focus:border-green-500" placeholder="¿Qué quieres traducir?">
                <button onclick="askMentor()" class="bg-green-600 text-white p-4 rounded-2xl">BILATU</button>
            </div>
            <div id="mentor-resp-container" class="hidden bg-green-50 p-6 rounded-3xl border-2 border-green-100">
                <p id="mentor-loading" class="text-green-700 font-bold animate-pulse hidden">Begiratzen... 📖</p>
                <p id="mentor-resp" class="text-slate-800 leading-relaxed text-lg hidden"></p>
            </div>
            <button onclick="closeMentor()" class="mt-6 text-slate-400 w-full text-center font-bold">ITXI</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ajfifipbzuzyhjsxujvd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqZmlmaXBienV6eWhqc3h1anZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyODAyMzIsImV4cCI6MjA4Njg1NjIzMn0.ahwlw5yN-M_8wLu39FXJr7WQeKHIJeWpL4IJdTtShqM';
        const WORKER_URL = 'https://empty-silence-364e.joniturbu.workers.dev'; // URL DE TU WORKER (Seguro)

        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentIdx = 0, currentQs = [], currentModuleId = null;

        function showScreen(screenId) {
    // Ocultamos todas
    document.querySelectorAll('.screen').forEach(s => {
        s.classList.remove('active');
        s.style.display = 'none';
    });
    // Mostramos la que queremos
    const target = document.getElementById(screenId);
    if(target) {
        target.classList.add('active');
        target.style.display = 'flex';
        window.scrollTo(0,0);
    }
}

        async function loadModules() {
            const { data, error } = await client.from('modulos').select('*').order('orden');
            if (error) return;
            document.getElementById('module-list').innerHTML = data.map(m => `
                <div onclick="prepareModule(${m.id})" class="module-card p-6 flex justify-between items-center cursor-pointer">
                    <h3 class="text-xl font-bold text-slate-800">${m.titulo}</h3>
                    <div class="w-10 h-10 bg-green-100 text-green-700 rounded-full flex items-center justify-center font-black">${m.orden}</div>
                </div>
            `).join('');
        }

        async function prepareModule(id) {
            const { data } = await client.from('modulos').select('*').eq('id', id).single();
            currentModuleId = id;
            document.getElementById('theory-title').innerText = data.titulo;
            document.getElementById('theory-subtitle').innerText = data.dificultad;
            document.getElementById('theory-content').innerText = data.teoria_contenido;
            showScreen('scr-theory');
        }

        async function startQuizFromTheory() {
            const { data } = await client.from('preguntas').select('*').eq('modulo_id', currentModuleId);
            currentQs = data; currentIdx = 0;
            showScreen('scr-quiz'); renderQ();
        }

        function renderQ() {
            const q = currentQs[currentIdx];
            document.getElementById('q-counter').innerText = `GALDERA ${currentIdx + 1} / ${currentQs.length}`;
            document.getElementById('q-card').innerText = q.enunciado;
            document.getElementById('progress-bar').style.width = `${((currentIdx) / currentQs.length) * 100}%`;
            document.getElementById('options').innerHTML = q.opciones.map((o, i) => `
                <button onclick="check(${i})" class="w-full bg-white border-2 border-slate-200 p-5 rounded-2xl font-bold text-slate-700 hover:border-green-500">${o}</button>
            `).join('');
        }

        function check(idx) {
            const isOk = idx === currentQs[currentIdx].respuesta_correcta;
            const fb = document.getElementById('feedback');
            fb.style.display = 'flex';
            document.getElementById('fb-img').src = isOk ? 'personaje-acierto.png' : 'personaje-fallo.png';
            document.getElementById('fb-title').innerText = isOk ? '¡OSO ONDO!' : '¡AI ENE!';
            document.getElementById('fb-title').style.color = isOk ? '#4ade80' : '#f87171';
            if(currentIdx === currentQs.length - 1) document.getElementById('progress-bar').style.width = '100%';
        }

        function nextQuestion() {
            document.getElementById('feedback').style.display = 'none';
            currentIdx++;
            if(currentIdx < currentQs.length) renderQ();
            else { alert("Zorionak!"); showScreen('scr-modules'); }
        }

        // Lógica del Diccionario usando tu Worker (Fallo 5 corregido)
        async function askMentor() {
    const queryInput = document.getElementById('mentor-query');
    const query = queryInput.value.trim();
    if(!query) return;

    const container = document.getElementById('mentor-resp-container');
    const loading = document.getElementById('mentor-loading');
    const resp = document.getElementById('mentor-resp');
    
    // UI: Mostrar que estamos trabajando
    container.classList.remove('hidden');
    loading.classList.remove('hidden');
    resp.classList.add('hidden');

    try {
        // LLAMADA AL WORKER (Asegúrate de que la URL sea la tuya)
        const response = await fetch('https://empty-silence-364e.joniturbu.workers.dev', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: query }) // Enviamos 'query' como espera el Worker
        });

        if(!response.ok) throw new Error(`Error en el servidor: ${response.status}`);

        const data = await response.json();

        // IMPORTANTE: Leemos 'data.texto' porque así lo envía tu Worker
        if (data.texto) {
            loading.classList.add('hidden');
            resp.innerText = data.texto;
            resp.classList.remove('hidden');
        } else {
            throw new Error("Respuesta vacía del mentor");
        }

    } catch(e) {
        console.error("Fallo en el Mentor:", e);
        loading.classList.add('hidden');
        resp.innerText = "¡Ay va! " + e.message + ". Revisa que el Worker tenga la API Key en Settings.";
        resp.classList.remove('hidden');
    }
}

        function openMentor() { document.getElementById('mentor-modal').style.display = 'flex'; document.getElementById('mentor-query').focus(); }
        function closeMentor() { document.getElementById('mentor-modal').style.display = 'none'; }
    </script>
</body>
</html>
